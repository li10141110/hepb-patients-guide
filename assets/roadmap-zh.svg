<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1120" font-family="'PingFang SC','Helvetica Neue',Helvetica,'Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <linearGradient id="curePath" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">乙肝治愈路线图</text>
  <text x="480" y="66" text-anchor="middle" font-size="13" fill="#64748b">Roadmap to Hepatitis B Cure · V3.1</text>

  <!-- ================= SECTION 1: HBV builds its base ================= -->
  <rect x="30" y="90" width="900" height="290" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="50" y="115" font-size="15" font-weight="700" fill="#991b1b">① 病毒如何建立据点</text>
  <text x="50" y="132" font-size="11" fill="#7f1d1d">How HBV establishes its stronghold</text>

  <!-- Step boxes -->
  <g font-size="12" fill="#111827">
    <!-- HBV entry -->
    <rect x="60" y="155" width="150" height="60" rx="8" fill="#fff" stroke="#f87171"/>
    <text x="135" y="180" text-anchor="middle" font-weight="700">HBV 感染</text>
    <text x="135" y="200" text-anchor="middle" font-size="10" fill="#6b7280">经 NTCP 进入肝细胞</text>

    <!-- cccDNA -->
    <rect x="240" y="155" width="150" height="60" rx="8" fill="#fff" stroke="#f87171"/>
    <text x="315" y="180" text-anchor="middle" font-weight="700">cccDNA 硬盘</text>
    <text x="315" y="200" text-anchor="middle" font-size="10" fill="#6b7280">核内共价闭合环状 DNA</text>

    <!-- Integration -->
    <rect x="420" y="155" width="150" height="60" rx="8" fill="#fff" stroke="#f87171"/>
    <text x="495" y="180" text-anchor="middle" font-weight="700">DNA 整合</text>
    <text x="495" y="200" text-anchor="middle" font-size="10" fill="#6b7280">嵌入宿主基因组</text>

    <!-- HBsAg factory -->
    <rect x="600" y="155" width="150" height="60" rx="8" fill="#fff" stroke="#f87171"/>
    <text x="675" y="180" text-anchor="middle" font-weight="700">HBsAg 工厂</text>
    <text x="675" y="200" text-anchor="middle" font-size="10" fill="#6b7280">大量表面抗原释放</text>

    <!-- Immune exhaustion -->
    <rect x="780" y="155" width="150" height="60" rx="8" fill="#fff" stroke="#f87171"/>
    <text x="855" y="180" text-anchor="middle" font-weight="700">免疫耗竭</text>
    <text x="855" y="200" text-anchor="middle" font-size="10" fill="#6b7280">T 细胞失能</text>
  </g>

  <!-- Arrows -->
  <line x1="210" y1="185" x2="240" y2="185" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arrRed)"/>
  <line x1="390" y1="185" x2="420" y2="185" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arrRed)"/>
  <line x1="570" y1="185" x2="600" y2="185" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arrRed)"/>
  <line x1="750" y1="185" x2="780" y2="185" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arrRed)"/>

  <!-- Consequences bar -->
  <g>
    <rect x="60" y="245" width="870" height="110" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="80" y="270" font-size="13" font-weight="700" fill="#9a3412">结果 · Consequences</text>
    <text x="80" y="295" font-size="11" fill="#7c2d12">• 慢性感染 · Chronic infection(可持续数十年)</text>
    <text x="80" y="315" font-size="11" fill="#7c2d12">• 肝纤维化 → 肝硬化 · Fibrosis → cirrhosis</text>
    <text x="80" y="335" font-size="11" fill="#7c2d12">• 肝细胞癌 · Hepatocellular carcinoma(HCC)</text>
    <text x="500" y="295" font-size="11" fill="#7c2d12">• 全球 2.54 亿感染者 · 254M globally infected</text>
    <text x="500" y="315" font-size="11" fill="#7c2d12">• 每年 80-110 万人死亡 · 800k-1.1M deaths/yr</text>
    <text x="500" y="335" font-size="11" fill="#7c2d12">• 中国 ~7000 万慢性携带 · ~70M in China</text>
  </g>

  <!-- ================= SECTION 2: Today's arsenal ================= -->
  <rect x="30" y="400" width="900" height="180" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="50" y="425" font-size="15" font-weight="700" fill="#1e40af">② 今天的武器 · Today's toolkit</text>
  <text x="50" y="442" font-size="11" fill="#1e3a8a">已上市 20+ 年,能压住病毒,但清不掉 cccDNA</text>

  <g font-size="12" fill="#111827">
    <rect x="60" y="465" width="200" height="90" rx="8" fill="#fff" stroke="#60a5fa"/>
    <text x="160" y="490" text-anchor="middle" font-weight="700">核苷类似物 NUCs</text>
    <text x="160" y="510" text-anchor="middle" font-size="10" fill="#6b7280">ETV / TDF / TAF</text>
    <text x="160" y="528" text-anchor="middle" font-size="10" fill="#6b7280">阻断逆转录</text>
    <text x="160" y="545" text-anchor="middle" font-size="10" fill="#dc2626">✗ 不能清除 cccDNA</text>

    <rect x="290" y="465" width="200" height="90" rx="8" fill="#fff" stroke="#60a5fa"/>
    <text x="390" y="490" text-anchor="middle" font-weight="700">干扰素 Peg-IFN</text>
    <text x="390" y="510" text-anchor="middle" font-size="10" fill="#6b7280">调节免疫 + 抗病毒</text>
    <text x="390" y="528" text-anchor="middle" font-size="10" fill="#6b7280">部分患者 HBsAg 转阴</text>
    <text x="390" y="545" text-anchor="middle" font-size="10" fill="#dc2626">✗ 副作用大,成功率低</text>

    <rect x="520" y="465" width="380" height="90" rx="8" fill="#fef9c3" stroke="#facc15"/>
    <text x="710" y="490" text-anchor="middle" font-weight="700" fill="#713f12">现状总结 · Where we are today</text>
    <text x="710" y="513" text-anchor="middle" font-size="11" fill="#713f12">可以把病毒复制压到检测不到,大幅降低肝硬化/肝癌风险</text>
    <text x="710" y="533" text-anchor="middle" font-size="11" fill="#713f12">但绝大多数患者需要终身服药,HBsAg 年清除率 &lt; 1%</text>
    <text x="710" y="551" text-anchor="middle" font-size="10" fill="#713f12">Suppression, not cure.</text>
  </g>

  <!-- ================= SECTION 3: Tomorrow's arsenal ================= -->
  <rect x="30" y="600" width="900" height="290" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="50" y="625" font-size="15" font-weight="700" fill="#065f46">③ 明天的武器 · Tomorrow's arsenal</text>
  <text x="50" y="642" font-size="11" fill="#064e3b">新一代药物已进入 II/III 期临床,单药突破有限,联合疗法是共识</text>

  <g font-size="11" fill="#111827">
    <!-- siRNA -->
    <rect x="55" y="665" width="170" height="95" rx="8" fill="#fff" stroke="#10b981"/>
    <text x="140" y="688" text-anchor="middle" font-weight="700">siRNA</text>
    <text x="140" y="706" text-anchor="middle" font-size="10" fill="#6b7280">VIR-2218 / JNJ-3989</text>
    <text x="140" y="723" text-anchor="middle" font-size="10" fill="#6b7280">RG6346</text>
    <text x="140" y="741" text-anchor="middle" font-size="10" fill="#059669">✓ 通吃 cccDNA+整合</text>
    <text x="140" y="756" text-anchor="middle" font-size="10" fill="#6b7280">"关掉 HBsAg 工厂"</text>

    <!-- ASO -->
    <rect x="235" y="665" width="170" height="95" rx="8" fill="#fff" stroke="#10b981"/>
    <text x="320" y="688" text-anchor="middle" font-weight="700">ASO</text>
    <text x="320" y="706" text-anchor="middle" font-size="10" fill="#6b7280">Bepirovirsen</text>
    <text x="320" y="723" text-anchor="middle" font-size="10" fill="#6b7280">III 期 B-Well</text>
    <text x="320" y="741" text-anchor="middle" font-size="10" fill="#059669">✓ 快速降 HBsAg</text>
    <text x="320" y="756" text-anchor="middle" font-size="10" fill="#6b7280">反义寡核苷酸</text>

    <!-- Capsid -->
    <rect x="415" y="665" width="170" height="95" rx="8" fill="#fff" stroke="#10b981"/>
    <text x="500" y="688" text-anchor="middle" font-weight="700">Capsid 调节剂</text>
    <text x="500" y="706" text-anchor="middle" font-size="10" fill="#6b7280">ABI-H3733</text>
    <text x="500" y="723" text-anchor="middle" font-size="10" fill="#6b7280">JNJ 系列</text>
    <text x="500" y="741" text-anchor="middle" font-size="10" fill="#059669">✓ 装配失败</text>
    <text x="500" y="756" text-anchor="middle" font-size="10" fill="#6b7280">干扰核衣壳组装</text>

    <!-- Entry -->
    <rect x="595" y="665" width="170" height="95" rx="8" fill="#fff" stroke="#10b981"/>
    <text x="680" y="688" text-anchor="middle" font-weight="700">入胞抑制剂</text>
    <text x="680" y="706" text-anchor="middle" font-size="10" fill="#6b7280">Bulevirtide</text>
    <text x="680" y="723" text-anchor="middle" font-size="10" fill="#6b7280">(已在欧盟上市)</text>
    <text x="680" y="741" text-anchor="middle" font-size="10" fill="#059669">✓ 拦门</text>
    <text x="680" y="756" text-anchor="middle" font-size="10" fill="#6b7280">阻断 NTCP 受体</text>

    <!-- Immune -->
    <rect x="775" y="665" width="150" height="95" rx="8" fill="#fff" stroke="#10b981"/>
    <text x="850" y="688" text-anchor="middle" font-weight="700">免疫疗法</text>
    <text x="850" y="706" text-anchor="middle" font-size="10" fill="#6b7280">治疗性疫苗</text>
    <text x="850" y="723" text-anchor="middle" font-size="10" fill="#6b7280">TLR / PD-1</text>
    <text x="850" y="741" text-anchor="middle" font-size="10" fill="#059669">✓ 唤醒 T 细胞</text>
    <text x="850" y="756" text-anchor="middle" font-size="10" fill="#6b7280">恢复免疫控制</text>

    <!-- CRISPR row -->
    <rect x="55" y="775" width="435" height="90" rx="8" fill="#fff" stroke="#10b981"/>
    <text x="272" y="798" text-anchor="middle" font-weight="700">CRISPR / 基因编辑</text>
    <text x="272" y="818" text-anchor="middle" font-size="10" fill="#6b7280">直接切断 cccDNA · 临床前 → 早期 I 期</text>
    <text x="272" y="836" text-anchor="middle" font-size="10" fill="#059669">✓ 理论上唯一能实现 sterilizing cure 的路径</text>
    <text x="272" y="854" text-anchor="middle" font-size="10" fill="#dc2626">✗ 递送、脱靶、安全性挑战巨大</text>

    <!-- Combination -->
    <rect x="500" y="775" width="425" height="90" rx="8" fill="#fef9c3" stroke="#facc15"/>
    <text x="712" y="798" text-anchor="middle" font-weight="700" fill="#713f12">联合疗法 · Combination Therapy</text>
    <text x="712" y="820" text-anchor="middle" font-size="11" fill="#713f12">NUC + siRNA/ASO + Capsid + 免疫调节</text>
    <text x="712" y="840" text-anchor="middle" font-size="11" fill="#713f12">"多点打击 + 免疫唤醒"是共识路径</text>
    <text x="712" y="856" text-anchor="middle" font-size="10" fill="#713f12">2026-2030 关键三期数据陆续公布</text>
  </g>

  <!-- ================= SECTION 4: The two cures ================= -->
  <rect x="30" y="910" width="900" height="185" rx="12" fill="url(#curePath)" stroke="#34d399"/>
  <text x="480" y="940" text-anchor="middle" font-size="16" font-weight="700" fill="#064e3b">④ 治愈的两个终点 · Two definitions of cure</text>

  <g>
    <rect x="80" y="960" width="380" height="115" rx="10" fill="#fff" stroke="#059669" stroke-width="1.6"/>
    <text x="270" y="985" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">功能性治愈 · Functional Cure</text>
    <text x="270" y="1008" text-anchor="middle" font-size="11" fill="#334155">HBsAg 持续消失 + anti-HBs 出现</text>
    <text x="270" y="1027" text-anchor="middle" font-size="11" fill="#334155">停药后无反弹 · No relapse off-therapy</text>
    <text x="270" y="1046" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">现实目标 · Realistic near-term goal</text>
    <text x="270" y="1064" text-anchor="middle" font-size="10" fill="#64748b">cccDNA 仍存在但被沉默,肝癌监测继续</text>

    <rect x="500" y="960" width="380" height="115" rx="10" fill="#fff" stroke="#059669" stroke-width="1.6" stroke-dasharray="4,3"/>
    <text x="690" y="985" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">彻底治愈 · Sterilizing Cure</text>
    <text x="690" y="1008" text-anchor="middle" font-size="11" fill="#334155">cccDNA 完全清除 + 整合 DNA 静默</text>
    <text x="690" y="1027" text-anchor="middle" font-size="11" fill="#334155">病毒学根除 · Virological eradication</text>
    <text x="690" y="1046" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">长期目标 · Long-term aspiration</text>
    <text x="690" y="1064" text-anchor="middle" font-size="10" fill="#64748b">需 CRISPR/基因编辑或免疫彻底清除感染细胞</text>
  </g>

  <!-- Cross-section arrows -->
  <line x1="480" y1="380" x2="480" y2="400" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="580" x2="480" y2="600" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="890" x2="480" y2="910" stroke="#059669" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Footer -->
  <text x="480" y="1110" text-anchor="middle" font-size="10" fill="#94a3b8">Jason Lee, PhD · 乙肝治愈手册 V3.1 · 2026 · CC BY-NC-SA · github link →</text>
</svg>
