<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'PingFang SC','Helvetica Neue','Microsoft YaHei',sans-serif">
  <defs>
    <pattern id="fibro-light" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0,10 L10,0" stroke="#dc2626" stroke-width="0.6" opacity="0.4"/>
    </pattern>
    <pattern id="fibro-med" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0,8 L8,0" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
    </pattern>
    <pattern id="fibro-heavy" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0,6 L6,0" stroke="#dc2626" stroke-width="1.5" opacity="0.8"/>
    </pattern>
    <pattern id="fibro-cirr" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0,4 L4,0 M-1,1 L1,-1 M3,5 L5,3" stroke="#7f1d1d" stroke-width="1"/>
    </pattern>
  </defs>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">肝纤维化分级 F0-F4</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Liver Fibrosis Staging (METAVIR)</text>

  <!-- F0 -->
  <g>
    <text x="105" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">F0</text>
    <text x="105" y="123" text-anchor="middle" font-size="10" fill="#166534">正常肝</text>
    <ellipse cx="105" cy="200" rx="70" ry="55" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
    <!-- lobule structure -->
    <g stroke="#7f1d1d" stroke-width="0.6" fill="none">
      <circle cx="85" cy="185" r="8"/>
      <circle cx="125" cy="185" r="8"/>
      <circle cx="105" cy="215" r="8"/>
      <circle cx="75" cy="215" r="6"/>
      <circle cx="135" cy="215" r="6"/>
    </g>
    <text x="105" y="285" text-anchor="middle" font-size="10" fill="#0f172a">无纤维化</text>
    <text x="105" y="300" text-anchor="middle" font-size="9" fill="#64748b">No fibrosis</text>
  </g>

  <!-- F1 -->
  <g>
    <text x="275" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#eab308">F1</text>
    <text x="275" y="123" text-anchor="middle" font-size="10" fill="#854d0e">轻度</text>
    <ellipse cx="275" cy="200" rx="70" ry="55" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
    <ellipse cx="275" cy="200" rx="70" ry="55" fill="url(#fibro-light)"/>
    <g stroke="#7f1d1d" stroke-width="0.6" fill="none">
      <circle cx="255" cy="185" r="8"/>
      <circle cx="295" cy="185" r="8"/>
      <circle cx="275" cy="215" r="8"/>
    </g>
    <text x="275" y="285" text-anchor="middle" font-size="10" fill="#0f172a">门管区扩张</text>
    <text x="275" y="300" text-anchor="middle" font-size="9" fill="#64748b">Portal fibrosis</text>
  </g>

  <!-- F2 -->
  <g>
    <text x="445" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#f97316">F2</text>
    <text x="445" y="123" text-anchor="middle" font-size="10" fill="#9a3412">中度 ⭐</text>
    <ellipse cx="445" cy="200" rx="70" ry="55" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
    <ellipse cx="445" cy="200" rx="70" ry="55" fill="url(#fibro-med)"/>
    <path d="M 395,180 L 495,220" stroke="#7f1d1d" stroke-width="2" opacity="0.7"/>
    <path d="M 400,215 L 490,180" stroke="#7f1d1d" stroke-width="2" opacity="0.5"/>
    <text x="445" y="285" text-anchor="middle" font-size="10" fill="#0f172a">门管区间纤维桥</text>
    <text x="445" y="300" text-anchor="middle" font-size="9" fill="#64748b">Bridging fibrosis</text>
  </g>

  <!-- F3 -->
  <g>
    <text x="615" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">F3</text>
    <text x="615" y="123" text-anchor="middle" font-size="10" fill="#7f1d1d">重度</text>
    <ellipse cx="615" cy="200" rx="70" ry="55" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
    <ellipse cx="615" cy="200" rx="70" ry="55" fill="url(#fibro-heavy)"/>
    <path d="M 555,180 L 675,180" stroke="#7f1d1d" stroke-width="2.5"/>
    <path d="M 555,200 L 675,200" stroke="#7f1d1d" stroke-width="2.5"/>
    <path d="M 555,220 L 675,220" stroke="#7f1d1d" stroke-width="2.5"/>
    <text x="615" y="285" text-anchor="middle" font-size="10" fill="#0f172a">大量桥接</text>
    <text x="615" y="300" text-anchor="middle" font-size="9" fill="#64748b">Advanced fibrosis</text>
  </g>

  <!-- F4 -->
  <g>
    <text x="785" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">F4</text>
    <text x="785" y="123" text-anchor="middle" font-size="10" fill="#450a0a">肝硬化 ⚠️</text>
    <ellipse cx="785" cy="200" rx="70" ry="55" fill="#7f1d1d" stroke="#450a0a" stroke-width="2"/>
    <ellipse cx="785" cy="200" rx="70" ry="55" fill="url(#fibro-cirr)"/>
    <!-- nodules -->
    <circle cx="760" cy="185" r="10" fill="#fca5a5" stroke="#7f1d1d"/>
    <circle cx="800" cy="180" r="8" fill="#fca5a5" stroke="#7f1d1d"/>
    <circle cx="820" cy="200" r="9" fill="#fca5a5" stroke="#7f1d1d"/>
    <circle cx="770" cy="215" r="11" fill="#fca5a5" stroke="#7f1d1d"/>
    <circle cx="805" cy="220" r="7" fill="#fca5a5" stroke="#7f1d1d"/>
    <text x="785" y="285" text-anchor="middle" font-size="10" fill="#0f172a">肝硬化 · 结节形成</text>
    <text x="785" y="300" text-anchor="middle" font-size="9" fill="#64748b">Cirrhosis</text>
  </g>

  <!-- 箭头 -->
  <path d="M 190,200 L 210,200 M 360,200 L 380,200 M 530,200 L 550,200 M 700,200 L 720,200" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- 数据对照表 -->
  <rect x="60" y="340" width="840" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="80" y="365" font-size="13" font-weight="700" fill="#0f172a">评估工具对照</text>

  <!-- 表头 -->
  <line x1="80" y1="380" x2="900" y2="380" stroke="#94a3b8"/>
  <g font-size="11" font-weight="700" fill="#334155">
    <text x="100" y="398">分级</text>
    <text x="200" y="398">FibroScan (kPa)</text>
    <text x="360" y="398">FIB-4</text>
    <text x="470" y="398">APRI</text>
    <text x="570" y="398">复查频率</text>
    <text x="720" y="398">治疗建议</text>
  </g>
  <line x1="80" y1="406" x2="900" y2="406" stroke="#e2e8f0"/>

  <g font-size="10">
    <text x="100" y="422" fill="#16a34a" font-weight="700">F0-F1</text>
    <text x="200" y="422" fill="#334155">&lt; 7.5</text>
    <text x="360" y="422" fill="#334155">&lt; 1.45</text>
    <text x="470" y="422" fill="#334155">&lt; 0.5</text>
    <text x="570" y="422" fill="#334155">每 6-12 个月</text>
    <text x="720" y="422" fill="#334155">观察或按 DNA/ALT 决定</text>
  </g>
  <line x1="80" y1="428" x2="900" y2="428" stroke="#e2e8f0"/>

  <g font-size="10">
    <text x="100" y="444" fill="#f97316" font-weight="700">F2 ⭐</text>
    <text x="200" y="444" fill="#334155">7.5 - 9.5</text>
    <text x="360" y="444" fill="#334155">1.45 - 3.25</text>
    <text x="470" y="444" fill="#334155">0.5 - 1.5</text>
    <text x="570" y="444" fill="#334155">每 6 个月</text>
    <text x="720" y="444" fill="#dc2626" font-weight="700">治疗触发点 (多数指南)</text>
  </g>
  <line x1="80" y1="450" x2="900" y2="450" stroke="#e2e8f0"/>

  <g font-size="10">
    <text x="100" y="466" fill="#dc2626" font-weight="700">F3</text>
    <text x="200" y="466" fill="#334155">9.5 - 12.5</text>
    <text x="360" y="466" fill="#334155">&gt; 3.25</text>
    <text x="470" y="466" fill="#334155">&gt; 1.5</text>
    <text x="570" y="466" fill="#334155">每 6 个月 + 影像</text>
    <text x="720" y="466" fill="#dc2626" font-weight="700">强烈建议治疗</text>
  </g>
  <line x1="80" y1="472" x2="900" y2="472" stroke="#e2e8f0"/>

  <g font-size="10">
    <text x="100" y="488" fill="#7f1d1d" font-weight="700">F4 ⚠️</text>
    <text x="200" y="488" fill="#334155">&gt; 12.5</text>
    <text x="360" y="488" fill="#334155">&gt; 3.25</text>
    <text x="470" y="488" fill="#334155">&gt; 2.0</text>
    <text x="570" y="488" fill="#334155">每 3 个月 + 影像</text>
    <text x="720" y="488" fill="#7f1d1d" font-weight="700">必须治疗 · 肝癌高危</text>
  </g>

  <!-- 底部提示 -->
  <rect x="60" y="540" width="840" height="70" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="80" y="562" font-size="12" font-weight="700" fill="#065f46">🌱 好消息</text>
  <text x="80" y="582" font-size="11" fill="#065f46">早中期(F0-F3)纤维化在有效抗病毒治疗下**可以部分逆转**。</text>
  <text x="80" y="600" font-size="11" fill="#065f46">越早规范治疗,越可能保住甚至恢复肝脏。</text>

  <text x="480" y="618" text-anchor="middle" font-size="9" fill="#94a3b8">Jason Lee, PhD · 乙肝治愈手册 V3.1</text>
</svg>
